# rulebooks/conditional_routing.yml
---
- name: Smart event routing
  hosts: all
  sources:
    - ansible.eda.webhook:    # EDA replaces this internally — you don't touch it
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Deploy triggered
      condition: event.payload.action == "deploy"
      action:
        run_job_template:
          name: Demo Job
          organization: Default

    - name: Cleanup triggered
      condition: event.payload.action == "cleanup"
      action:
        run_job_template:
          name: Cleanup Job
          organization: Default

    - name: Unknown action - notify
      condition: event.payload.action not in ["deploy", "cleanup"]
      action:
        debug:
          msg: "Unknown action received: {{ event.payload.action }}"
